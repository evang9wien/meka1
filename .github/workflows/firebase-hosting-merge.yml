# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: Find and Replace
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "base: '/pages'"
          replace: "base: '/'"
          include: "src/config.yaml"
          regex: false

      - name: 🔨 Build Project
        env:
          PUBLIC_FIREBASE_API_KEY: ${{ secrets.PUBLIC_FIREBASE_API_KEY }}
        run: |
          echo "Environment Variable: $PUBLIC_FIREBASE_API_KEY:"
          npm install
          npm run astro build

      - name: 📦 Install Functions Dependencies
        run: |
          cd functions
          npm install
          cd ..

      - name: 🔥 Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_EVANG9_COMBO_4CB8E }}
          channelId: live
          projectId: evang9-combo-4cb8e
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
      
      - name: 🔐 Setup Firebase Service Account Credentials
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_EVANG9_COMBO_4CB8E }}' > $HOME/gcloud-service-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcloud-service-key.json" >> $GITHUB_ENV
      
      - name: 🧹 Setup Cleanup Policy (prevent monthly costs)
        run: |
          npx firebase-tools@latest functions:artifacts:setpolicy --project evang9-combo-4cb8e --region europe-west1 --keep 5 || echo "Policy already exists or will be set during deploy"
      
      - name: 🔥 Deploy Functions
        run: npx firebase-tools@latest deploy --only functions --project evang9-combo-4cb8e
